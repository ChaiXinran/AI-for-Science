current_evidence_state: >-
  Many model variants have been trained, but existing comparisons are not yet
  publication-grade. V2/radar runs use RADAR_2025_S while most V3/V4 runs use
  RAIN_2025_S; recomputed reports contain only 24 saved samples (10 for one
  FACL run), so cross-family ranking and significance claims are invalid.
next_decision: >-
  Determine whether PWV provides event-held-out incremental information for
  convective birth/growth beyond radar history and negative controls before
  training another deep architecture.
